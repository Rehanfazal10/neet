<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}
.container {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
h1 { color:#ff4d6d; }
button {
    padding:10px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover { background:#e63950; }
.question { margin:15px 0; }
#timer { font-weight:bold; }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const questions = [
    {question:"The Malvaceae family is characterized by which feature?",options:["Actinomorphic flowers, monadelphous stamens","Zygomorphic flowers, diadelphous stamens","Unisexual flowers, tetradynamous stamens","Inferior ovary, epipetalous stamens"],answer:"Actinomorphic flowers, monadelphous stamens"},
    {question:"The efferent process of neuron is known as",options:["Dendron","Axon","Cyton","Dendrite"],answer:"Axon"},
    {question:"The heart in cockroach has how many chambers?",options:["2 thorax 11 abdomen","3 thorax 10 abdomen","2 thorax 10 abdomen","3 thorax 9 abdomen"],answer:"3 thorax 10 abdomen"},
    {question:"Open circulatory system not hindrance because",options:["Heart simple","Blood colorless","Malpighian tubules","Systems not connected"],answer:"Systems not connected"},
    {question:"True for Pheretima",options:["Dioecious","Night copulation rainy","Anytime rain","No backward movement"],answer:"Night copulation rainy"},
    {question:"Pharyngeal nephridia in segments",options:["3,4,5","4,5,6","5,6,7","6,7,8"],answer:"4,5,6"},
    {question:"Parallel vectors value",options:["0","2","3","4"],answer:"2"},
    {question:"Work done question",options:["70J","75J","72J","80J"],answer:"75J"},
    {question:"False statement",options:["Scalars","Vectors","Distance scalar","Vector only magnitude"],answer:"Vector only magnitude"},
    {question:"Assertion reason",options:["Both true correct","Both true wrong","Assertion true","Both false"],answer:"Both false"}
];

let index=0, score=0, time=60, timer;

function home(){
    document.getElementById("app").innerHTML=`
    <h1>❤️ Welcome ❤️</h1>
    <p>You are strong, smart and capable 💖<br>Keep going, your dreams are closer than you think ✨</p>
    <button onclick="startQuiz()">Start Test 💕</button>`;
}

function startQuiz(){ index=0; score=0; loadQ(); }

function loadQ(){
    if(index>=questions.length){ result(); return; }
    time=60;
    clearInterval(timer);
    timer=setInterval(()=>{
        time--;
        document.getElementById("timer").innerText="Time: "+time+"s";
        if(time<=0){ index++; loadQ(); }
    },1000);

    let q=questions[index];
    document.getElementById("app").innerHTML=`
    <div id="timer">Time: 60s</div>
    <div class="question">${q.question}</div>
    ${q.options.map(o=>`<button onclick="check('${o}')">${o}</button>`).join('')}`;
}

function check(ans){
    if(ans===questions[index].answer) score++;
    index++;
    loadQ();
}

function result(){
    let percent=(score/questions.length)*100;
    let msg="";

    if(percent===100) msg="Perfect! I'm so proud of you ❤️ Keep shining 🌟";
    else if(percent>=70) msg="Amazing! You're doing great 💪 Keep studying 💖";
    else if(percent>=40) msg="Good effort! Stay focused, you can do it ✨";
    else msg="Don't worry, keep मेहनत and you will win ❤️";

    document.getElementById("app").innerHTML=`
    <h2>Score: ${score}/${questions.length}</h2>
    <h3>${percent.toFixed(0)}%</h3>
    <p>${msg}</p>`;
}


home();
</script>
</body>
</html>
